services:
  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: typedsql_test
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prisma']
      interval: 5s
      timeout: 5s
      retries: 5
